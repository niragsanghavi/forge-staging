<?xml version="1.0" encoding="UTF-8"?>
<!--
  FORGE ICON MASTER - v2.0 FINAL
  Foundry v2 picks, confirmed 22 Jul 2026.
  WALK:B filled walker | RUN:B filled sprinter | CYCLING:B cyclist on bike
  SWIM:B waves | CARDIO:B heart+pulse | GYM:A flat dumbbell
  COMBAT:G filled glove | RACKET:A strung racket | BALL:C double-arc seam
  MIND:A lotus sit | DANCE:F disco point | FLAME:C double tongue tall

  SURFACES
    Feed / bold surfaces  -> primary ids (g-walk, g-run, g-combat are FILLED)
    Calendar / fine       -> use -line twin for walk/run/combat, primary for rest
    stroke-width: 1.6 fine | 2.5 bold (set via CSS class on the <svg>)

  CATEGORY COLOURS (currentColor)
    cardio #4cc3ff  walk run cycle swim cardio
    strength #d4a843  gym combat flame
    sport #4ade80  racket ball
    mind #b48cff | dance #ff7ab8

  MAPPING (48 strings -> 12 glyphs)
    g-walk: walk, hiking | g-run: run, running, hyrox sim, sprint
    g-cycle: cycling, spinning | g-swim: swimming
    g-cardio: cardio, hiit, skipping, rowing, stairs
    g-gym: gym, weight/strength training, crossfit, calisthenics, leg day,
      legs, upper body, core, core training, full body workout,
      bicep shoulder tricep, chest shoulder tricep
    g-combat: muay thai, boxing, mma
    g-racket: padel, pickleball, badminton, squash, tennis
    g-ball: cricket, volleyball, football, basketball, spikeball, frisbee, golf
    g-mind: yoga, pilates, stretching, physio(therapy), meditation
    g-dance: zumba, dance | g-flame: fallback + streak
    Normalise: lowercase, strip punctuation, collapse spaces, then
    Levenshtein (2 edits >=8 chars, 1 edit 5-7 chars).

  USAGE (relative path works on staging and goforge.in)
    <svg class="fx-fine" width="16" height="16" style="color:#4cc3ff">
      <use href="assets/icons.svg#g-walk-line"/>
    </svg>
    CSS: .fx-fine{stroke-width:1.6} .fx-bold{stroke-width:2.5}
-->
<svg xmlns="http://www.w3.org/2000/svg" width="0" height="0" style="position:absolute" aria-hidden="true">

  <!-- WALK B : filled walker (feed) -->
  <symbol id="g-walk" viewBox="0 0 24 24">
    <g fill="currentColor" stroke="none">
      <circle cx="13" cy="4.5" r="1.9"/>
      <path d="M12 6.8 L14 6.8 L14.6 13 L16 19 L14 19 L12.6 14 L10.8 19 L8.8 19 L11.2 12.5 Z"/>
      <path d="M13.6 8 L16 10.5 L15 11.6 L12.8 9.6 Z"/>
    </g>
  </symbol>
  <!-- WALK stroke twin (calendar) -->
  <symbol id="g-walk-line" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="13" cy="4.5" r="1.6"/>
    <path d="M13 6.5 L12.6 13 M12.6 13 L15 19 M12.6 13 L10 19 M13.2 8.5 L15.8 11 M13.2 8.5 L10.5 10.5"/>
  </symbol>

