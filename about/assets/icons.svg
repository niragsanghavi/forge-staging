    <path d="M12 21 C8.5 19.3 9 15.5 11.2 13.2 C12 14.5 13 13.5 13 11.3 C14.8 13.5 15.4 15.3 15.4 17 C15.4 19.3 14 21 12 21 Z" opacity="0.65"/>
