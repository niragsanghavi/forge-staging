  <symbol id="g-run-line" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="15.5" cy="4.5" r="1.6"/>
    <path d="M14.5 6.5 L12 11.5 M12 11.5 L8.5 17 M12 11.5 L16 14 L15.5 18 M14 8 L17.5 10 M14 8 L10.5 8.8"/>
